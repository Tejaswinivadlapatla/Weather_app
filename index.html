<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="overlay">
      <!-- Logo -->
      <div class="logo">
        <i class="fa-solid fa-cloud-sun"></i>
        <div>
          <h1>Weather App</h1>
          <p>Real-Time Weather Information</p>
        </div>
      </div>

      <!-- Search -->
      <div class="search-box">
        <input type="text" id="city" placeholder="Search City" />

        <button onclick="getWeather()">
          <i class="fa-solid fa-magnifying-glass"></i>
          Search
        </button>
      </div>

      <!-- Weather Card -->

      <div class="weather-card">
        <div class="left">
          <h2 id="cityName">City Name</h2>

          <p id="date">Date & Time</p>

          <img
            id="weatherIcon"
            src="https://openweathermap.org/img/wn/01d@2x.png"
          />

          <h1 id="temp">0°C</h1>

          <h3 id="condition">Weather Condition</h3>
        </div>

        <div class="right">
          <div class="item">
            <i class="fa-solid fa-droplet"></i>
            <span>Humidity</span>
            <p id="humidity">0%</p>
          </div>

          <div class="item">
            <i class="fa-solid fa-wind"></i>
            <span>Wind</span>
            <p id="wind">0 km/h</p>
          </div>

          <div class="item">
            <i class="fa-solid fa-gauge-high"></i>
            <span>Pressure</span>
            <p id="pressure">0 hPa</p>
          </div>

          <div class="item">
            <i class="fa-solid fa-eye"></i>
            <span>Visibility</span>
            <p id="visibility">0 km</p>
          </div>
        </div>
      </div>
    <script src="script.js"></script>
  </body>
</html>
